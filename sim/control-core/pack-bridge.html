<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HBCE • Pack Bridge</title>
<meta name="theme-color" content="#0b0f14">

<style>
body{background:#0b0f14;color:#e6edf3;font-family:system-ui;margin:0;padding:20px}
.wrap{max-width:1100px;margin:auto}
.box{border:1px solid #2b3137;border-radius:12px;padding:14px;margin-bottom:14px;background:#11161c}
textarea{width:100%;min-height:180px;background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:8px;padding:10px;font-family:monospace}
button{padding:10px 14px;border-radius:8px;border:1px solid #444;background:#161b22;color:white;cursor:pointer}
button:hover{background:#1f2630}
pre{background:#0d1117;padding:12px;border-radius:8px;overflow:auto}
.ok{color:#3fb950}
.bad{color:#ff6b6b}
</style>
</head>

<body>
<div class="wrap">

<h2>HBCE Evidence + Binding Bridge</h2>
<p>Merge binding receipt inside evidence pack and regenerate pack_hash.</p>

<div class="box">
<h3>1. Evidence Pack JSON</h3>
<textarea id="pack"></textarea>
</div>

<div class="box">
<h3>2. Binding Receipt JSON</h3>
<textarea id="receipt"></textarea>
</div>

<div class="box">
<button onclick="validate()">Validate</button>
<button onclick="merge()">Merge → New Pack</button>
<button onclick="copyOut()">Copy</button>
</div>

<div class="box">
<h3>Status</h3>
<div id="status">—</div>
</div>

<div class="box">
<h3>New Pack</h3>
<pre id="out">{}</pre>
</div>

</div>

<script>
let validated=false;
let mergedPack=null;

function stable(obj){
  if(obj===null||typeof obj!=="object")return JSON.stringify(obj);
  if(Array.isArray(obj))return "["+obj.map(stable).join(",")+"]";
  return "{"+Object.keys(obj).sort().map(k=>JSON.stringify(k)+":"+stable(obj[k])).join(",")+"}";
}

async function sha256(str){
 const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(str));
 return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

function setStatus(txt,ok=true){
 document.getElementById("status").innerHTML=
 ok?`<span class="ok">${txt}</span>`:`<span class="bad">${txt}</span>`;
}

async function validate(){
 try{
  const pack=JSON.parse(document.getElementById("pack").value);
  const receipt=JSON.parse(document.getElementById("receipt").value);

  if(pack.proto!=="HBCE-EVIDENCE-PACK-v1")
    return setStatus("Wrong evidence pack proto",false);

  if(receipt.proto!=="HBCE-BINDING-RECEIPT-v1")
    return setStatus("Wrong receipt proto",false);

  const r=JSON.parse(JSON.stringify(receipt));
  const rh=r.receipt_hash;
  delete r.receipt_hash;

  const recomputed=await sha256(stable(r));
  if(recomputed!==rh)
    return setStatus("Receipt hash mismatch",false);

  setStatus("VALIDATED");
  validated=true;

 }catch(e){
  setStatus("Invalid JSON",false);
 }
}

async function merge(){
 if(!validated) return setStatus("Validate first",false);

 const pack=JSON.parse(document.getElementById("pack").value);
 const receipt=JSON.parse(document.getElementById("receipt").value);

 if(!pack.attachments) pack.attachments=[];

 pack.attachments.push({
   kind:"JOKER_BINDING",
   receipt_hash:receipt.receipt_hash,
   binding:receipt.binding,
   receipt:receipt,
   ts:new Date().toISOString()
 });

 delete pack.pack_hash;
 delete pack.signature;

 const newHash=await sha256(stable(pack));
 pack.pack_hash=newHash;

 pack.signature={
   algo:"NONE",
   note:"Modified after merge"
 };

 mergedPack=pack;
 document.getElementById("out").textContent=
 JSON.stringify(pack,null,2);

 setStatus("MERGED ✔");
}

function copyOut(){
 if(!mergedPack) return;
 navigator.clipboard.writeText(JSON.stringify(mergedPack,null,2));
 setStatus("Copied");
}
</script>
</body>
</html>
