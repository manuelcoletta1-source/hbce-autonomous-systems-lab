<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HBCE • Evidence Verifier</title>
<meta name="theme-color" content="#0b0f14" />

<style>
body{background:#0b0f14;color:#e6edf3;font-family:system-ui;margin:0;padding:20px}
.wrap{max-width:1100px;margin:auto}
.box{border:1px solid #2b3137;border-radius:12px;padding:14px;margin-bottom:14px;background:#11161c}
textarea{width:100%;min-height:220px;background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:8px;padding:10px;font-family:monospace}
button{padding:10px 14px;border-radius:8px;border:1px solid #444;background:#161b22;color:white;cursor:pointer}
button:hover{background:#1f2630}
pre{background:#0d1117;padding:12px;border-radius:8px;overflow:auto}
.ok{color:#3fb950}
.bad{color:#ff6b6b}

/* FULL SCREEN FAIL OVERLAY */
#failOverlay{
position:fixed;
inset:0;
background:#0b0f14;
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

#failOverlay .inner{
max-width:600px;
text-align:center;
border:1px solid rgba(255,0,0,.35);
padding:40px;
border-radius:20px;
background:rgba(255,0,0,.05);
}

#failOverlay h1{
color:#ff4d4d;
font-size:28px;
margin-bottom:20px;
letter-spacing:.08em;
}

#failOverlay p{
opacity:.9;
margin-bottom:30px;
}

#failOverlay button{
border:1px solid #ff4d4d;
background:transparent;
}
</style>
</head>

<body>

<div id="failOverlay">
  <div class="inner">
    <h1>EXECUTION DENIED</h1>
    <p>
      Evidence failed deterministic verification.<br>
      System state is non-admissible.
    </p>
    <button onclick="closeOverlay()">Dismiss</button>
  </div>
</div>

<div class="wrap">

<h2>HBCE • Autonomous Systems Lab</h2>
<h3>Evidence Pack Verifier</h3>

<div class="box">
<textarea id="input" placeholder="Paste HBCE Evidence Pack JSON"></textarea>
</div>

<div class="box">
<button onclick="verify()">Verify</button>
<button onclick="clearAll()">Clear</button>
</div>

<div class="box">
<h3>Result</h3>
<div>Status: <span id="status">—</span></div>
<div>Pack Hash: <span id="ph">—</span></div>
<div>Recomputed: <span id="rc">—</span></div>
<div>Ledger: <span id="lg">—</span></div>
<div>Entries: <span id="en">—</span></div>
</div>

<div class="box">
<h3>Diagnostics</h3>
<pre id="diag"></pre>
</div>

</div>

<script src="./verifier.js"></script>

<script>
function showOverlay(){
document.getElementById("failOverlay").style.display="flex";
}
function closeOverlay(){
document.getElementById("failOverlay").style.display="none";
}
</script>

</body>
</html>
