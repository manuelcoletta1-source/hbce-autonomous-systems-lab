<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HBCE Autonomous Runtime</title>
<meta name="theme-color" content="#0b0f14">

<style>
body{background:#0b0f14;color:#e6edf3;font-family:system-ui;margin:0;padding:30px}
.wrap{max-width:1100px;margin:auto}
.card{background:#11161c;border:1px solid #2b3137;border-radius:14px;padding:20px;margin-bottom:18px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
.ok{color:#3fb950}
.bad{color:#ff6b6b}
button{padding:10px 14px;border-radius:8px;border:1px solid #444;background:#161b22;color:white;cursor:pointer}
button:hover{background:#1f2630}
pre{background:#0d1117;padding:12px;border-radius:8px}
</style>
</head>

<body>
<div class="wrap">

<h1>HBCE Autonomous Runtime</h1>
<p>Decision layer bound to Control Core simulation.</p>

<div class="grid">

<div class="card">
<h3>Identity</h3>
<div>Machine: HBCE-AI-UNIT-001</div>
<div>Operator: Manuel Coletta</div>
<div>AI: Joker-C2</div>
</div>

<div class="card">
<h3>Context</h3>
<div>Policy: <span id="policy">—</span></div>
<div>Scenario: <span id="scenario">—</span></div>
<div>Seed: <span id="seed">—</span></div>
</div>

<div class="card">
<h3>Runtime</h3>
<div>Status: <span id="status" class="bad">HALTED</span></div>
<div>Last Evidence:</div>
<pre id="hash">—</pre>
</div>

</div>

<div class="card">
<button onclick="connectCore()">Connect Control Core</button>
<button onclick="start()">Start Runtime</button>
<button onclick="stop()">Stop Runtime</button>
<button onclick="snapshot()">Generate Evidence</button>
</div>

<div class="card">
<h3>Event Log</h3>
<pre id="log"></pre>
</div>

</div>

<script>
let running=false;
let ctx=null;

function log(t){
 document.getElementById("log").textContent+=t+"\\n";
}

function setStatus(s,ok){
 const el=document.getElementById("status");
 el.textContent=s;
 el.className=ok?"ok":"bad";
}

function getQuery(){
 const p=new URLSearchParams(location.search);
 return{
  policy:p.get("p"),
  scenario:p.get("s"),
  seed:p.get("seed")
 };
}

function connectCore(){
 ctx=getQuery();

 if(!ctx.policy){
   log("No Control Core link detected.");
   return;
 }

 document.getElementById("policy").textContent=ctx.policy;
 document.getElementById("scenario").textContent=ctx.scenario;
 document.getElementById("seed").textContent=ctx.seed;

 log("Connected to Control Core.");
}

function start(){
 if(!ctx){ log("Connect Control Core first"); return; }
 running=true;
 setStatus("RUNNING",true);
 log("Runtime started.");
}

function stop(){
 running=false;
 setStatus("HALTED",false);
 log("Runtime halted.");
}

async function sha256(str){
 const data=new TextEncoder().encode(str);
 const buf=await crypto.subtle.digest("SHA-256",data);
 return [...new Uint8Array(buf)]
 .map(b=>b.toString(16).padStart(2,"0")).join("");
}

async function snapshot(){
 if(!running){ log("Runtime halted."); return; }

 const snap={
   ts:new Date().toISOString(),
   machine:"HBCE-AI-UNIT-001",
   policy:ctx.policy,
   scenario:ctx.scenario,
   seed:ctx.seed,
   state:"ACTIVE"
 };

 const h=await sha256(JSON.stringify(snap));
 document.getElementById("hash").textContent=h;

 log("Evidence snapshot: "+h);
}
</script>

</body>
</html>
